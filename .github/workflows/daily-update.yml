name: Atualização diária do catálogo

# Roda todo dia à meia-noite de Brasília (UTC-3 = 03:00 UTC).
# Também pode ser disparado manualmente em Actions → Run workflow.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Buscar novas faixas (MusicBrainz)
        run: node tools/auto-update.mjs

      - name: Commitar se houver novidades
        run: |
          if [ -n "$(git status --porcelain data/seeds.json)" ]; then
            git config user.name "disco-boogie-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/seeds.json
            git commit -m "chore: atualização diária do catálogo (MusicBrainz)"
            git push
          else
            echo "Sem novas faixas hoje — nada a commitar."
          fi
