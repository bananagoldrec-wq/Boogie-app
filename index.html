<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Descoberta de música disco e boogie dos anos 70 e 80 via mapa mundial. Sem cadastro, sem chaves de API." />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Disco &amp; Boogie Globe</title>

  <!-- PWA / atalho na tela inicial -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#232020" />

  <!-- iOS: roda em tela cheia (esconde a barra de navegação do Safari) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Disco & Boogie" />

  <!-- Ícones -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Google Fonts: Playfair Display (editorial) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css?v=31" />
</head>
<body>
  <header class="topbar">
    <h1 class="logo">Disco &amp; Boogie</h1>
    <button id="radio-btn" class="nav-btn radio" type="button" aria-label="Rádio aleatória" title="Rádio — tocar aleatório">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2.5" y="8" width="19" height="12" rx="1.6"/><path d="M16.6 3.2 8 8"/><circle cx="8.3" cy="14" r="3"/><path d="M14.6 12h4.3M14.6 15.2h4.3"/>
      </svg><span class="nav-txt">Rádio</span>
    </button>
    <button id="open-playlists" class="nav-btn" type="button" aria-label="Minhas playlists" title="Minhas playlists">
      <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 14v-2.2a8 8 0 0 1 16 0V14"/><rect x="2.3" y="13.4" width="4" height="6.6" rx="1.3"/><rect x="17.7" y="13.4" width="4" height="6.6" rx="1.3"/>
      </svg><span class="nav-txt">Playlists</span>
    </button>
  </header>

  <main class="layout">
    <!-- Mapa -->
    <section id="map" aria-label="Mapa-múndi interativo"></section>

    <!-- Painel lateral de resultados (só aparece ao escolher um país) -->
    <aside id="panel" class="panel" aria-live="polite" hidden>
      <div id="panel-content" class="panel-content">
        <div class="panel-header">
          <button id="back-btn" class="back-btn" type="button" aria-label="Fechar">‹</button>
          <h2 id="country-title">País</h2>
          <span id="country-count" class="country-count"></span>
        </div>

        <div id="unavailable" class="unavailable" hidden>
          <svg class="sad-vinyl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
            <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.4"/><circle cx="12" cy="12" r="0.6" fill="currentColor" stroke="none"/>
          </svg>
          <p>Nenhuma produção de disco ou boogie encontrada neste país.</p>
        </div>

        <ul id="track-list" class="track-list"></ul>

        <p id="sources-note" class="sources-note"></p>
      </div>
    </aside>
  </main>

  <!-- Painel de playlists (slide-in) -->
  <aside id="playlists-panel" class="side-panel" hidden aria-label="Playlists">
    <div class="side-panel-head">
      <h2>Minhas Playlists</h2>
      <button class="icon-btn" type="button" data-close-playlists aria-label="Fechar">×</button>
    </div>
    <div class="side-panel-body">
      <button id="new-playlist-btn" class="btn-link new-pl" type="button">+ Nova playlist</button>
      <div id="playlists-list" class="playlists-list"></div>
      <div id="playlist-detail" class="playlist-detail" hidden></div>
    </div>
  </aside>

  <!-- Modal do player -->
  <div id="player-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close aria-label="Fechar">×</button>
      <h3 id="modal-title"></h3>
      <p id="modal-sub" class="modal-sub"></p>
      <div id="player-queue" class="player-queue" hidden></div>
      <div id="player-body" class="player-body"></div>
    </div>
  </div>

  <!-- Dialog genérico (escolher/criar playlist, renomear) -->
  <div id="dialog" class="modal" hidden>
    <div class="modal-backdrop" data-dialog-close></div>
    <div class="modal-card dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <button class="modal-close" type="button" data-dialog-close aria-label="Fechar">×</button>
      <h3 id="dialog-title"></h3>
      <div id="dialog-body" class="dialog-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- YouTube IFrame API (rádio: música completa) -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- Service worker: mantém o app sempre atualizado quando online -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>

  <!-- App modules (ordem importa) -->
  <script src="js/musicbrainz.js?v=31"></script>
  <script src="js/discogs.js?v=31"></script>
  <script src="js/itunes.js?v=31"></script>
  <script src="js/deezer.js?v=31"></script>
  <script src="js/youtube.js?v=31"></script>
  <script src="js/icons.js?v=31"></script>
  <script src="js/algorithm.js?v=31"></script>
  <script src="js/playlists.js?v=31"></script>
  <script src="js/prefs.js?v=31"></script>
  <script src="js/preset-likes.js?v=31"></script>
  <script src="js/player.js?v=31"></script>
  <script src="js/map.js?v=31"></script>
  <script src="js/app.js?v=31"></script>
</body>
</html>
